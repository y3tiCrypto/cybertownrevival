version: "3"
services:
    nginx:
        image: nginx:alpine
        ports:
            - "8001:80"
            - "443:443"
        depends_on:
            - "ct-api"
            - "db"
        links:
            - "ct-api"
            - "db"
        volumes:
            - ./:/var/www/cybertown
            - ./docker/nginx/vhost.conf:/etc/nginx/conf.d/cybertown.conf
            - ./docker/ssl:/etc/ssl
        working_dir: /var/www/cybertown

    db:
        image: mysql:5.7
        ports:
            - "3360:3306"
        volumes:
            - data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: pw
            MYSQL_DATABASE: cybertown

    ct-api:
        image: node:14
        depends_on:
            - "db"
        links:
            - "db"
        volumes:
            - ./api:/usr/src/app
            - ./spa:/usr/src/spa
        working_dir: /usr/src/app
        ports:
            - "3000:3000"
            - "9229:9229"
        command: bash -c "npm install && npm run dev"



    mailhog:
        image: mailhog/mailhog:latest
        logging:
            driver: "none" # disable saving logs
        ports:
            - 1025:1025
            - 8025:8025

volumes:
    data:
